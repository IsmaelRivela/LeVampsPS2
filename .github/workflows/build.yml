name: Build deliverables

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            cmd: npm run build:mac
          - os: windows-latest
            cmd: npm run build:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: ${{ matrix.cmd }}
      - uses: actions/upload-artifact@v4
        with:
          name: levamps-${{ matrix.os }}
          path: dist/*
